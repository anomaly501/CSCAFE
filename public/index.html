<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta name="description"
        content="cscafe — Premium destination for CSE opportunities. Jobs, internships, scholarships, hackathons & more!" />
    <title>cscafe | Premium CSE Opportunities</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700;900&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.6);
            --accent-red: #da5b4b;
            --mouse-x: 50%;
            --mouse-y: 50%;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f0e9;
            /* Parchment texture simulation + interactive radial glow */
            background-image:
                radial-gradient(circle at var(--mouse-x) var(--mouse-y), rgba(218, 91, 75, 0.08) 0%, transparent 40%),
                radial-gradient(#dcd8cf 1px, transparent 1px),
                linear-gradient(to right, rgba(0, 0, 0, 0.02) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 0, 0, 0.02) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 100px 100px, 100px 100px;
            background-attachment: fixed;
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }



        .title-cafe {
            font-family: 'Playfair Display', serif;
            font-size: clamp(50px, 10vw, 100px);
            font-weight: 400;
            letter-spacing: 3px;
            color: #1a1a1a;
            line-height: 1;
        }

        .filter-pill {
            padding: 12px 28px;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 500;
            color: #444;
            transition: all 0.3s;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .filter-pill:hover,
        .filter-pill.active {
            background: rgba(255, 255, 255, 0.7);
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .search-bar {
            width: 100%;
            padding: 18px 24px;
            border-radius: 50px;
            font-size: 18px;
            outline: none;
            transition: all 0.3s;
        }

        .search-container {
            position: relative;
            width: 100%;
            max-width: 680px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .card {
            width: 100%;
            max-width: 720px;
            padding: 24px;
            margin-bottom: 24px;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
        }

        .card-logo {
            width: 100px;
            height: 100px;
            background: rgba(0, 0, 0, 0.05);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 16px;
            color: #666;
            flex-shrink: 0;
        }

        .tag {
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .btn-apply,
        .btn-deadline {
            color: white;
            padding: 14px 34px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .btn-apply {
            background: var(--accent-red);
        }

        .btn-deadline {
            background: #ef4444;
            /* red-500 */
        }

        .btn-apply:hover,
        .btn-deadline:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        /* Category Emojis/Icons */
        .pill-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes pulse-red {
            0% {
                box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.4);
            }

            70% {
                box-shadow: 0 0 0 10px rgba(220, 38, 38, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(220, 38, 38, 0);
            }
        }

        .pulse-deadline {
            animation: pulse-red 2s infinite;
        }
    </style>
</head>

<body class="p-4 md:p-10">
    <!-- Header Section -->
    <header class="flex flex-col items-center gap-10 mb-16 w-full mt-8">
        <div class="flex flex-col md:flex-row items-center gap-4 md:gap-8">
            <h1 class="title-cafe">CAFE</h1>
        </div>

        <nav class="flex flex-wrap justify-center gap-4">
            <div class="glass filter-pill active" onclick="setCategory('all')">
                <span class="pill-icon">✨</span> All
            </div>
            <div class="glass filter-pill" onclick="setCategory('Internship')">
                <span class="pill-icon">💼</span> Internships
            </div>
            <div class="glass filter-pill" onclick="setCategory('Hackathon')">
                <span class="pill-icon">💻</span> Hackathons
            </div>
            <div class="glass filter-pill" onclick="setCategory('Jobs')">
                <span class="pill-icon">🏢</span> Jobs
            </div>
            <div class="glass filter-pill" onclick="setCategory('Scholarship')">
                <span class="pill-icon">🎓</span> Scholarships
            </div>
            <div class="glass filter-pill" onclick="setCategory('Blog')">
                <span class="pill-icon">👤</span> Blog
            </div>
        </nav>
    </header>

    <!-- Search Section -->
    <div class="search-container mb-16 px-4">
        <div class="relative flex-1">
            <svg class="absolute left-6 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400" fill="none"
                stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
            <input type="text" id="searchInput" placeholder="SEARCH." class="glass search-bar pl-14"
                oninput="renderPosts()">
            <div class="absolute right-6 top-1/2 -translate-y-1/2 cursor-pointer text-gray-400">
                <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                </svg>
            </div>
        </div>
        <button class="text-gray-500 font-bold px-6 py-2 rounded-full hover:bg-white/50 transition-colors"
            onclick="toggleSort()">Sort</button>
    </div>

    <!-- Posts Container -->
    <main class="w-full flex flex-col items-center px-4" id="postsList">
        <!-- Cards will be injected here -->
    </main>

    <!-- SCRIPTS -->
    <script src="index.js"></script>
</body>

</html>
