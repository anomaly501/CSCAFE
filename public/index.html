<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta name="description"
        content="cscafe — Premium destination for CSE opportunities. Jobs, internships, scholarships, hackathons & more!" />
    <title>cscafe | Premium CSE Opportunities</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700;900&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.6);
            --accent-red: #da5b4b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f0e9;
            /* Parchment texture simulation */
            background-image:
                radial-gradient(#dcd8cf 1px, transparent 1px),
                linear-gradient(to right, rgba(0, 0, 0, 0.02) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 0, 0, 0.02) 1px, transparent 1px);
            background-size: 40px 40px, 100px 100px, 100px 100px;
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }



        .title-cafe {
            font-family: 'Playfair Display', serif;
            font-size: clamp(50px, 10vw, 100px);
            font-weight: 400;
            letter-spacing: 3px;
            color: #1a1a1a;
            line-height: 1;
        }

        .filter-pill {
            padding: 12px 28px;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 500;
            color: #444;
            transition: all 0.3s;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .filter-pill:hover,
        .filter-pill.active {
            background: rgba(255, 255, 255, 0.7);
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .search-bar {
            width: 100%;
            padding: 18px 24px;
            border-radius: 50px;
            font-size: 18px;
            outline: none;
            transition: all 0.3s;
        }

        .search-container {
            position: relative;
            width: 100%;
            max-width: 680px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .card {
            width: 100%;
            max-width: 720px;
            padding: 24px;
            margin-bottom: 24px;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
        }

        .card-logo {
            width: 100px;
            height: 100px;
            background: rgba(0, 0, 0, 0.05);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 16px;
            color: #666;
            flex-shrink: 0;
        }

        .tag {
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .btn-apply {
            background: var(--accent-red);
            color: white;
            padding: 12px 28px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .btn-apply:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        /* Category Emojis/Icons */
        .pill-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>

<body class="p-4 md:p-10">
    <!-- Header Section -->
    <header class="flex flex-col items-center gap-10 mb-16 w-full mt-8">
        <div class="flex flex-col md:flex-row items-center gap-4 md:gap-8">
            <h1 class="title-cafe">CAFE</h1>
        </div>

        <nav class="flex flex-wrap justify-center gap-4">
            <div class="glass filter-pill active" onclick="setCategory('all')">
                <span class="pill-icon">✨</span> All
            </div>
            <div class="glass filter-pill" onclick="setCategory('Internship')">
                <span class="pill-icon">💼</span> Internships
            </div>
            <div class="glass filter-pill" onclick="setCategory('Hackathon')">
                <span class="pill-icon">💻</span> Hackathons
            </div>
            <div class="glass filter-pill" onclick="setCategory('Jobs')">
                <span class="pill-icon">🏢</span> Jobs
            </div>
            <div class="glass filter-pill" onclick="setCategory('Scholarship')">
                <span class="pill-icon">🎓</span> Scholarships
            </div>
            <div class="glass filter-pill" onclick="setCategory('Blog')">
                <span class="pill-icon">👤</span> Blog
            </div>
        </nav>
    </header>

    <!-- Search Section -->
    <div class="search-container mb-16 px-4">
        <div class="relative flex-1">
            <svg class="absolute left-6 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400" fill="none"
                stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
            <input type="text" id="searchInput" placeholder="SEARCH." class="glass search-bar pl-14"
                oninput="renderPosts()">
            <div class="absolute right-6 top-1/2 -translate-y-1/2 cursor-pointer text-gray-400">
                <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                </svg>
            </div>
        </div>
        <button class="text-gray-500 font-bold px-6 py-2 rounded-full hover:bg-white/50 transition-colors"
            onclick="toggleSort()">Sort</button>
    </div>

    <!-- Posts Container -->
    <main class="w-full flex flex-col items-center px-4" id="postsList">
        <!-- Cards will be injected here -->
    </main>

    <!-- SCRIPTS -->
    <script>
        const API = '/api';
        let data = { updates: [] };
        let currentCategory = 'all';
        let sortOrder = 'latest';

        // ===== SECURITY UTILITIES =====
        function escapeHTML(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.appendChild(document.createTextNode(String(str)));
            return div.innerHTML;
        }

        function sanitizeUrl(url) {
            if (!url) return '';
            try {
                const parsed = new URL(url.trim(), location.href);
                if (['http:', 'https:', 'mailto:'].includes(parsed.protocol)) return url.trim();
                return '';
            } catch { return ''; }
        }

        async function loadData() {
            try {
                // Fetching from your existing backend API
                const response = await fetch(API + '/updates');
                data.updates = await response.json();
                renderPosts();
            } catch (err) {
                console.error('Failed to load data:', err);
                document.getElementById('postsList').innerHTML = `
                    <div class="glass p-8 text-center text-red-500">
                        <p class="font-bold">⚠ Connection failed</p>
                        <p class="text-sm opacity-70">Make sure the Node.js server is running.</p>
                    </div>
                `;
            }
        }

        function setCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.filter-pill').forEach(el => {
                el.classList.remove('active');
                // Check if the pill's onclick contains the specific category
                if (el.getAttribute('onclick').includes(`'${cat}'`)) {
                    el.classList.add('active');
                }
            });
            renderPosts();
        }

        function toggleSort() {
            sortOrder = sortOrder === 'latest' ? 'deadline' : 'latest';
            renderPosts();
        }

        // Category emojis configuration
        const catEmojis = { Internship: '💼', Jobs: '🏢', Scholarship: '🎓', Hackathon: '💻', Fellowship: '🔬', Workshop: '🛠️', General: '📋', Exams: '📝', Notice: '📌', Results: '📊', Contest: '🏆', Blog: '👤' };

        function getCategoryEmoji(cat) {
            return catEmojis[cat] || '📋';
        }

        function getTagColor(idx) {
            const colors = ['#fef2f2', '#f0fdf4', '#eff6ff', '#fefce8', '#faf5ff'];
            return colors[idx % colors.length];
        }

        function getTagTextColor(idx) {
            const colors = ['#991b1b', '#166534', '#1e40af', '#854d0e', '#6b21a8'];
            return colors[idx % colors.length];
        }

        function renderPosts() {
            const container = document.getElementById('postsList');
            const query = document.getElementById('searchInput').value.toLowerCase();

            let filtered = data.updates.filter(u => {
                const matchCat = currentCategory === 'all' || u.cat === currentCategory;
                const terms = (u.title + ' ' + u.desc + ' ' + (u.tags || '')).toLowerCase();
                const matchSearch = terms.includes(query);
                return matchCat && matchSearch;
            });

            // Sorting logic
            filtered.sort((a, b) => {
                if (sortOrder === 'deadline') {
                    return new Date(a.date) - new Date(b.date);
                }
                return b.id - a.id; // Latest by ID
            });

            if (filtered.length === 0) {
                container.innerHTML = '<div class="glass p-10 text-gray-400 font-medium text-center">No results found for your search.</div>';
                return;
            }

            container.innerHTML = filtered.map(u => {
                let dateStr = 'TBD';
                try {
                    dateStr = new Date(u.date).toISOString().split('T')[0];
                } catch (e) { }

                const tagList = u.tags ? u.tags.split(',').map(t => t.trim()) : [];
                const emoji = getCategoryEmoji(u.cat);

                return `
                    <div class="glass card flex flex-col sm:flex-row items-start sm:items-center gap-8">
                        <div class="card-logo text-5xl"><span>${emoji}</span></div>
                        <div class="flex-1 w-full">
                            <div class="mb-2">
                                <h3 class="text-2xl font-black text-gray-800 tracking-tight">${escapeHTML(u.title)}</h3>
                            </div>
                            <p class="text-base text-gray-500 mb-6 leading-relaxed">${escapeHTML(u.desc)}</p>
                            
                            <div class="flex flex-wrap items-center gap-3">
                                <div class="flex flex-wrap gap-2">
                                    ${tagList.map((tag, idx) => `
                                        <span class="tag" style="background: ${getTagColor(idx)}; color: ${getTagTextColor(idx)};">${escapeHTML(tag)}</span>
                                    `).join('')}
                                </div>
                                
                                <div class="sm:ml-auto mt-4 sm:mt-0">
                                    <a href="post.html?id=${parseInt(u.id)}" class="btn-apply inline-block">Apply By ${escapeHTML(dateStr)}</a>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Initial load
        loadData();
    </script>
</body>

</html>
